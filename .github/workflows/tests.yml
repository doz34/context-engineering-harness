name: tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]

    steps:
    # Pinned to immutable commit SHAs (dogfooding ci_cd_pinning).
    # To update: use Dependabot or bump SHA manually after reviewing the
    # release notes. See F-001 in audit/fresh-eyes-v102/05-findings.md.
    - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683  # v4.2.2

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b  # v5.3.0
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pytest pytest-cov pyyaml

    - name: Self-audit (validate workflow is SHA-pinned)
      # Dogfooding F-001 (audit 2026-06-10) - this workflow enforces
      # the same pinning it documents. If anyone re-introduces a
      # mutable tag, CI will fail.
      run: |
        python -c "
        import sys
        sys.path.insert(0, 'prototype')
        from lib.ci_cd_pinning import validate_workflow_file
        r = validate_workflow_file('.github/workflows/tests.yml')
        if not r.is_valid:
            print('CI/CD pinning check FAILED:')
            for i in r.issues:
                print(f'  [{i.severity}] {i.location} {i.message}')
            sys.exit(1)
        print(f'CI/CD pinning OK {r.pinned_count} pinned, {r.mutable_count} mutable')
        "

    - name: Run all tests
      run: |
        cd prototype
        python -m pytest tests/ -v

    - name: "Coverage gate - v1.1 78% minimum"
      # Refuses the build if lib/ coverage falls below 78%. New v1.1
      # modules have dedicated tests but some paths require cryptography
      # or subprocess isolation not available in all CI runners.
      run: |
        cd prototype
        python -m pytest tests/ --cov=lib --cov-report=term-missing --cov-fail-under=78

    - name: Run adversarial tests separately
      run: |
        cd prototype
        python -m pytest tests/adversarial_*.py -v

    - name: Verify install script
      run: |
        bash prototype/bin/install.sh

    - name: "Run demo - assert e2e passes"
      # The demo's spawn-and-verify path now uses
      # firewall.last_sub_id (not hard-coded 'sub_1'), and an
      # end-to-end test asserts is_valid: True. This step greps
      # the demo output to ensure the audit passed; if not, CI
      # fails loudly instead of printing a false negative and
      # exiting 0.
      run: |
        cd prototype
        bash bin/ctxh-demo 2>&1 | tee /tmp/demo.out
        if grep -qE "'is_valid': True|is_valid: True" /tmp/demo.out; then
          echo "✅ Demo e2e audit passed"
        else
          echo "❌ Demo e2e audit did NOT show is_valid: True — see /tmp/demo.out"
          exit 1
        fi
